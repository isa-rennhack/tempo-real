[platformio]
src_dir = .

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
upload_port = COM5
upload_speed = 115200
upload_flags =
  --before=default_reset
  --after=hard_reset
  --connect-attempts=10
monitor_port = COM5
monitor_speed = 115200
monitor_rts = 0
monitor_dtr = 0
board_build.filesystem = littlefs
build_src_filter =
  +<main.cpp>
  -<nke_polling_sv.c>
  -<esp_sketch/>
